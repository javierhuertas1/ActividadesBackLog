<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backlog — COE Cloud / DevSecOps</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --surface2: #1a1e27;
    --border: #252a36;
    --border2: #2e3547;
    --text: #e8eaf0;
    --muted: #7a8099;
    --accent: #f97316;
    --accent-dim: rgba(249,115,22,0.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --teal: #2dd4bf;
    --teal-dim: rgba(45,212,191,0.12);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; font-family: var(--mono);
  }
  .project-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .project-sub { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .btn {
    padding: 7px 16px; border-radius: 8px; font-size: 13px;
    font-family: var(--sans); cursor: pointer; border: none;
    font-weight: 600; transition: all 0.15s;
  }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: #ea6a0a; }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 32px; }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat.s-total::before { background: var(--accent); }
  .stat.s-pend::before { background: var(--blue); }
  .stat.s-prog::before { background: var(--amber); }
  .stat.s-done::before { background: var(--green); }
  .stat-val { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
  .stat-lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  /* FILTERS */
  .filters {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
    justify-content: space-between;
  }
  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-pill {
    padding: 5px 14px; border-radius: 99px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border2); background: transparent; color: var(--muted);
    cursor: pointer; font-family: var(--sans); transition: all 0.15s; letter-spacing: 0.02em;
  }
  .filter-pill:hover { border-color: var(--accent); color: var(--accent); }
  .filter-pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .search-box {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; padding: 7px 14px; font-size: 13px;
    color: var(--text); font-family: var(--mono); outline: none; width: 200px;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 12px 16px; text-align: left;
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    font-family: var(--mono);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 14px 16px; font-size: 14px; vertical-align: middle; }

  .task-id { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .task-name { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }

  /* TAGS */
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
    font-family: var(--mono); letter-spacing: 0.02em;
  }
  .tag-dot { width: 5px; height: 5px; border-radius: 50%; }
  .tag-infra { background: var(--blue-dim); color: var(--blue); }
  .tag-infra .tag-dot { background: var(--blue); }
  .tag-obs { background: var(--teal-dim); color: var(--teal); }
  .tag-obs .tag-dot { background: var(--teal); }
  .tag-pres { background: var(--amber-dim); color: var(--amber); }
  .tag-pres .tag-dot { background: var(--amber); }
  .tag-finops { background: var(--purple-dim); color: var(--purple); }
  .tag-finops .tag-dot { background: var(--purple); }
  .tag-arch { background: var(--accent-dim); color: var(--accent); }
  .tag-arch .tag-dot { background: var(--accent); }
  .tag-sec { background: var(--red-dim); color: var(--red); }
  .tag-sec .tag-dot { background: var(--red); }

  /* PRIORITY */
  .prio { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-family: var(--mono); }
  .prio-dot { width: 8px; height: 8px; border-radius: 2px; }
  .prio-high { color: var(--red); }
  .prio-high .prio-dot { background: var(--red); }
  .prio-med { color: var(--amber); }
  .prio-med .prio-dot { background: var(--amber); }
  .prio-low { color: var(--green); }
  .prio-low .prio-dot { background: var(--green); }

  /* PROGRESS */
  .prog-wrap { display: flex; align-items: center; gap: 10px; }
  .prog-bar { flex: 1; height: 4px; background: var(--border2); border-radius: 99px; overflow: hidden; min-width: 80px; }
  .prog-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .prog-pct { font-size: 12px; font-family: var(--mono); color: var(--muted); min-width: 32px; }

  /* STATUS */
  .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-family: var(--mono); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .s-todo .status-dot { background: var(--muted); }
  .s-inprog .status-dot { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: pulse 1.5s infinite; }
  .s-done .status-dot { background: var(--green); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ACTION */
  .action-btn {
    padding: 5px 12px; border-radius: 7px; font-size: 12px; font-family: var(--mono);
    background: transparent; border: 1px solid var(--border2); color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* FOOTER */
  .footer { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
  .footer-info { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  /* MODAL */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px; padding: 28px;
    width: 420px; max-width: 95vw;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-family: var(--mono); margin-bottom: 7px; display: block; }
  .form-input {
    width: 100%; padding: 9px 12px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 8px;
    font-size: 14px; color: var(--text); font-family: var(--sans);
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-select { appearance: none; cursor: pointer; }
  .range-wrap { display: flex; align-items: center; gap: 12px; }
  input[type=range] {
    flex: 1; accent-color: var(--accent); height: 4px; cursor: pointer;
  }
  .range-val { font-family: var(--mono); font-size: 13px; color: var(--accent); min-width: 40px; text-align: right; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .modal-footer .btn-cancel-m {
    padding: 8px 18px; border-radius: 8px; font-size: 13px; font-family: var(--sans);
    background: transparent; border: 1px solid var(--border2); color: var(--muted); cursor: pointer; font-weight: 600;
  }
  .modal-footer .btn-cancel-m:hover { background: var(--surface2); color: var(--text); }
  .modal-footer .btn-save {
    padding: 8px 18px; border-radius: 8px; font-size: 13px; font-family: var(--sans);
    background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 700;
  }
  .modal-footer .btn-save:hover { background: #ea6a0a; }

  /* EMPTY STATE */
  .empty { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    background: var(--surface2); border: 1px solid var(--green);
    border-radius: 10px; padding: 12px 20px; font-size: 13px;
    color: var(--green); font-family: var(--mono);
    transform: translateY(80px); opacity: 0;
    transition: all 0.25s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ENTER ANIMATION */
  tbody tr { animation: rowIn 0.25s ease both; }
  @keyframes rowIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">LP</div>
    <div>
      <div class="project-name">COE Cloud / DevSecOps</div>
      <div class="project-sub">Sprint Backlog — Q2 2026</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="exportCSV()">↓ Exportar CSV</button>
    <button class="btn btn-accent" onclick="openAdd()">+ Nueva tarea</button>
  </div>
</div>

<div class="container">

  <!-- STATS -->
  <div class="stats-row" id="stats-row">
    <div class="stat s-total">
      <div class="stat-val" id="st-total">7</div>
      <div class="stat-lbl">Total tareas</div>
    </div>
    <div class="stat s-pend">
      <div class="stat-val" id="st-pend">7</div>
      <div class="stat-lbl">Pendientes</div>
    </div>
    <div class="stat s-prog">
      <div class="stat-val" id="st-prog">0</div>
      <div class="stat-lbl">En progreso</div>
    </div>
    <div class="stat s-done">
      <div class="stat-val" id="st-done">0</div>
      <div class="stat-lbl">Completadas</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-group" id="filters">
      <button class="filter-pill active" data-filter="all">Todas</button>
      <button class="filter-pill" data-filter="infra">IaC / Infra</button>
      <button class="filter-pill" data-filter="obs">Observability</button>
      <button class="filter-pill" data-filter="pres">Presentación</button>
      <button class="filter-pill" data-filter="finops">FinOps</button>
      <button class="filter-pill" data-filter="arch">Arquitectura</button>
      <button class="filter-pill" data-filter="sec">Seguridad</button>
    </div>
<input type="hidden" id="search-input" value="" />
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:60px;">ID</th>
          <th>Tarea</th>
          <th style="width:120px;">Categoría</th>
          <th style="width:80px;">Prioridad</th>
          <th style="width:80px;">Estado</th>
          <th style="width:160px;">Progreso</th>
          <th style="width:80px;"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-info" id="footer-info">Mostrando 7 de 7 tareas</div>
    <div class="footer-info">Progreso promedio: <span id="avg-pct" style="color:var(--accent)">0%</span></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Editar tarea</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre de la tarea</label>
      <input type="text" class="form-input" id="f-name" placeholder="Ej: Documentar Lambda IaC..." />
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group">
        <label class="form-label">Categoría</label>
        <select class="form-input form-select" id="f-tag">
          <option value="infra">IaC / Infra</option>
          <option value="obs">Observability</option>
          <option value="pres">Presentación</option>
          <option value="finops">FinOps</option>
          <option value="arch">Arquitectura</option>
          <option value="sec">Seguridad</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Prioridad</label>
        <select class="form-input form-select" id="f-prio">
          <option value="Alta">Alta</option>
          <option value="Media">Media</option>
          <option value="Baja">Baja</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Progreso</label>
      <div class="range-wrap">
        <input type="range" min="0" max="100" step="5" id="f-pct" oninput="document.getElementById('range-preview').textContent=this.value+'%'" />
        <span class="range-val" id="range-preview">0%</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel-m" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Guardado correctamente</div>

<script>
const TAGS = {
  infra:  { label: 'IaC / Infra',     cls: 'tag-infra' },
  obs:    { label: 'Observability',   cls: 'tag-obs' },
  pres:   { label: 'Presentación',    cls: 'tag-pres' },
  finops: { label: 'FinOps',          cls: 'tag-finops' },
  arch:   { label: 'Arquitectura',    cls: 'tag-arch' },
  sec:    { label: 'Seguridad',       cls: 'tag-sec' },
};

let tasks = [
  { id: 'BL-01', name: 'Documentar Lambda Terraform IaC',                      tag: 'infra',  prio: 'Alta',  pct: 0 },
  { id: 'BL-02', name: 'Presentación migración EKS → ECS con Fargate',         tag: 'pres',   prio: 'Alta',  pct: 0 },
  { id: 'BL-03', name: 'Trusty 2.0',                                            tag: 'sec',    prio: 'Media', pct: 0 },
  { id: 'BL-04', name: 'Adopción Dynatrace con EKS',                            tag: 'obs',    prio: 'Alta',  pct: 0 },
  { id: 'BL-05', name: 'Adopción Dynatrace con Lambda',                         tag: 'obs',    prio: 'Alta',  pct: 0 },
  { id: 'BL-06', name: 'Integrar historial de reportes FinOps en Backoffice COE', tag: 'finops', prio: 'Media', pct: 0 },
  { id: 'BL-07', name: 'Tareas de arquitectura de nuevo frontend',              tag: 'arch',   prio: 'Media', pct: 0 },
];

let activeFilter = 'all';
let editingIdx = null;

function progColor(pct) {
  if (pct === 100) return '#22c55e';
  if (pct >= 50)  return '#f59e0b';
  if (pct > 0)    return '#3b82f6';
  return '#4b5563';
}

function statusHtml(pct) {
  if (pct === 100) return `<span class="status s-done"><span class="status-dot"></span>Completo</span>`;
  if (pct > 0)    return `<span class="status s-inprog"><span class="status-dot"></span>En progreso</span>`;
  return `<span class="status s-todo"><span class="status-dot"></span>Pendiente</span>`;
}

function prioHtml(p) {
  const cls = p==='Alta'?'prio-high': p==='Media'?'prio-med':'prio-low';
  return `<span class="prio ${cls}"><span class="prio-dot"></span>${p}</span>`;
}

function filtered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  return tasks.filter((t,i) => {
    const matchFilter = activeFilter === 'all' || t.tag === activeFilter;
    const matchSearch = !q || t.name.toLowerCase().includes(q) || t.id.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  }).map((t,_) => ({ ...t, _idx: tasks.indexOf(t) }));
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const rows = filtered();
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">No se encontraron tareas.</td></tr>`;
    updateStats();
    return;
  }
  tbody.innerHTML = rows.map((t, ri) => {
    const tag = TAGS[t.tag];
    const color = progColor(t.pct);
    return `
    <tr onclick="openEdit(${t._idx})" style="animation-delay:${ri*0.04}s">
      <td><span class="task-id">${t.id}</span></td>
      <td><span class="task-name">${t.name}</span></td>
      <td><span class="tag ${tag.cls}"><span class="tag-dot"></span>${tag.label}</span></td>
      <td>${prioHtml(t.prio)}</td>
      <td>${statusHtml(t.pct)}</td>
      <td>
        <div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" style="width:${t.pct}%;background:${color};"></div></div>
          <span class="prog-pct" style="color:${t.pct>0?color:'var(--muted)'}">${t.pct}%</span>
        </div>
      </td>
      <td onclick="event.stopPropagation()">
        <button class="action-btn" onclick="openEdit(${t._idx})">editar</button>
      </td>
    </tr>`;
  }).join('');
  updateStats();
}

function updateStats() {
  const total = tasks.length;
  const done  = tasks.filter(t => t.pct === 100).length;
  const inprog = tasks.filter(t => t.pct > 0 && t.pct < 100).length;
  const pend  = tasks.filter(t => t.pct === 0).length;
  const avg   = total ? Math.round(tasks.reduce((s,t)=>s+t.pct,0)/total) : 0;
  const vis   = filtered().length;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-pend').textContent  = pend;
  document.getElementById('st-prog').textContent  = inprog;
  document.getElementById('st-done').textContent  = done;
  document.getElementById('avg-pct').textContent  = avg + '%';
  document.getElementById('footer-info').textContent = `Mostrando ${vis} de ${total} tareas`;
}

// FILTERS
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-pill');
  if (!btn) return;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderTable();
});

// MODAL
function openEdit(i) {
  editingIdx = i;
  const t = tasks[i];
  document.getElementById('modal-title').textContent = 'Editar tarea';
  document.getElementById('f-name').value = t.name;
  document.getElementById('f-tag').value  = t.tag;
  document.getElementById('f-prio').value = t.prio;
  document.getElementById('f-pct').value  = t.pct;
  document.getElementById('range-preview').textContent = t.pct + '%';
  document.getElementById('modal').classList.add('open');
}

function openAdd() {
  editingIdx = null;
  document.getElementById('modal-title').textContent = 'Nueva tarea';
  document.getElementById('f-name').value = '';
  document.getElementById('f-tag').value  = 'infra';
  document.getElementById('f-prio').value = 'Media';
  document.getElementById('f-pct').value  = 0;
  document.getElementById('range-preview').textContent = '0%';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function saveTask() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const tag  = document.getElementById('f-tag').value;
  const prio = document.getElementById('f-prio').value;
  const pct  = parseInt(document.getElementById('f-pct').value);
  if (editingIdx !== null) {
    tasks[editingIdx] = { ...tasks[editingIdx], name, tag, prio, pct };
  } else {
    const n = tasks.length + 1;
    tasks.push({ id: 'BL-' + String(n).padStart(2,'0'), name, tag, prio, pct });
  }
  closeModal();
  renderTable();
  showToast();
}

// Close on backdrop click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// EXPORT CSV
function exportCSV() {
  const headers = ['ID','Tarea','Categoría','Prioridad','Progreso','Estado'];
  const rows = tasks.map(t => [
    t.id,
    `"${t.name}"`,
    TAGS[t.tag].label,
    t.prio,
    t.pct + '%',
    t.pct===100?'Completo': t.pct>0?'En progreso':'Pendiente'
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'backlog-coe-devops.csv';
  a.click();
}

renderTable();
</script>
